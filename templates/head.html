<!--
  GLOBAL HEAD TEMPLATE
  --------------------
  This file contains head elements that are shared across ALL pages.

  Do NOT add page-specific content here such as:
  - page titles
  - meta descriptions
  - canonical URLs
  - Open Graph tags

  Instead, add those to the seo config overrides section under each page, if you need to customize them. Otherwise, the defaults from the SEO template will be used.
-->

<!-- Character encoding -->
<meta charset="UTF-8">
<!-- Responsive viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Browser UI theme color (used on mobile browsers) -->
<meta name="theme-color" content="#1F1D5D">
<meta http-equiv="X-UA-Compatible" content="IE=edge">


<!-- Favicons -->
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/icon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/icon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<link rel="shortcut icon" href="/favicons/Noblemens.ico" type="image/x-icon">

<!-- Web App Manifest (PWA support) -->
<link rel="manifest" href="/favicons/site.webmanifest" type="application/manifest+json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="/src/css/main.css">
