<!-- =========================================================
     NOBLEMENS BLOG CARD (TEMPLATE)
========================================================= -->

<article class="card card-content">

    <!-- =========================================
       MEDIA (IMAGE)
  ========================================= -->
    <div class="card__media">
        <a data-field="image-link">
            <img data-field="image" src="" alt="" />
        </a>
    </div>

    <!-- =========================================
       BODY
  ========================================= -->
    <div class="card__body">

        <!-- META (Category + Date) -->
        <div class="card__meta text-caption text-muted" data-field="meta"></div>

        <!-- TITLE -->
        <h3 class="text-heading-md">
            <a data-field="title-link" href="" class="hover:no-underline">
                Blog Title Goes Here
            </a>
        </h3>

        <!-- DESCRIPTION -->
        <p class="text-body text-muted" data-field="description">
            Short description of the article goes here...
        </p>

    </div>

    <!-- =========================================
       FOOTER (CTA)
  ========================================= -->
    <div class="card__footer">

        <a data-field="read-more-btn" href="" class="btn btn-secondary hover:no-underline">
            Read More
        </a>

    </div>

</article>
