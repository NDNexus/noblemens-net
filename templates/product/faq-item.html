<!-- FAQ ITEM TEMPLATE -->
<template id="faq-item-template">
    <div class="faq-item border border-border-subtle rounded-md overflow-hidden">

        <h3 class="faq-heading">
            <button class="faq-trigger w-full flex items-center justify-between px-5 py-4 text-left"
                aria-expanded="false">

                <span class="faq-question">
                    {{question}}
                </span>

                <span class="faq-icon"></span>
            </button>
        </h3>

        <div class="faq-content">
            <div class="faq-answer text-muted px-5 pb-5 pt-0">
                {{answer}}
            </div>
        </div>

    </div>
</template>
