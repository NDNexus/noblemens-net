<!-- =========================================================
     NOBLEMENS ARCHIVE TEMPLATE (BLOG)
========================================================= -->

<section class="section">
    <div class="container">

        <!-- =========================================
         HEADER
    ========================================= -->
        <div class="mb-10">

            <h1 id="archive-title" class="text-heading-xl">
                Articles
            </h1>

            <p id="archive-description" class="text-body pt-3 text-muted">
                Explore insights, guides, and knowledge.
            </p>

        </div>


        <!-- =========================================
         CONTROLS
    ========================================= -->
        <div class="flex flex-wrap gap-4 items-center justify-between mb-8">

            <!-- SEARCH -->
            <input id="archive-search" type="text" placeholder="Search articles..." class="input" />

            <!-- SORT -->
            <select id="archive-sort" class="select">
                <option value="latest">Latest</option>
                <option value="oldest">Oldest</option>
            </select>

        </div>


        <!-- =========================================
         CATEGORY FILTERS (OPTIONAL)
    ========================================= -->
        <div id="archive-filters" class="flex flex-wrap gap-3 mb-8"></div>


        <!-- =========================================
         GRID (RENDER TARGET)
    ========================================= -->
        <div id="archive-grid" class="grid grid-md gap-lg"></div>


        <!-- =========================================
         LOAD MORE
    ========================================= -->
        <div class="text-center mt-10">

            <button id="archive-load-more" class="btn btn-accent">
                Load More
            </button>

        </div>

    </div>
</section>
